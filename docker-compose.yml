services:
  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "9999:9999"
    depends_on:
      api1:
        condition: service_healthy
      api2:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.05"
          memory: "10MB"
    networks:
      - rinha

  api1:
    image: ghcr.io/talesporto/rinha-2026-api:latest
    environment:
      - PORT=9999
      - INDEX_PATH=resources/index.bin
      - NPROBE=25
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9999/ready || exit 1"]
      interval: 2s
      timeout: 2s
      retries: 30
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: "0.475"
          memory: "170MB"
    networks:
      - rinha

  api2:
    image: ghcr.io/talesporto/rinha-2026-api:latest
    environment:
      - PORT=9999
      - INDEX_PATH=resources/index.bin
      - NPROBE=25
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9999/ready || exit 1"]
      interval: 2s
      timeout: 2s
      retries: 30
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: "0.475"
          memory: "170MB"
    networks:
      - rinha

networks:
  rinha:
    driver: bridge
